name: Release Rust

on:
  workflow_dispatch:
  push:
    tags:
      - "rust/v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BINARY_NAME: smart-git-rs
      TARGET: x86_64-unknown-linux-musl
      ARCHIVE_SUFFIX: linux-amd64-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release metadata
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#rust/}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Rust target
        run: rustup target add ${{ env.TARGET }}

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --manifest-path smart-git-rs/Cargo.toml --release --target ${{ env.TARGET }}

      - name: Package
        run: |
          mkdir package
          cp "smart-git-rs/target/${TARGET}/release/${BINARY_NAME}" package/${BINARY_NAME}
          cp LICENSE package/
          tar -czf "${BINARY_NAME}-${ARCHIVE_SUFFIX}.tar.gz" -C package .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.ARCHIVE_SUFFIX }}
          path: ./${{ env.BINARY_NAME }}-${{ env.ARCHIVE_SUFFIX }}.tar.gz

      - name: Attach release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          files: ./${{ env.BINARY_NAME }}-${{ env.ARCHIVE_SUFFIX }}.tar.gz

  docker:
    runs-on: ubuntu-latest
    needs: build
    env:
      IMAGE_NAME: wjqserver/smart-git-rs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release metadata
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#rust/}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Rust image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./smart-git-rs/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME }}:latest
